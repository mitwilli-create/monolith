<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0c" />
  <meta name="color-scheme" content="light" />
  <title>MONOLITH</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- The runway film: one long, unhurried cut above the fold. Pure CSS,
       zero network weight. It pauses when scrolled away (observer below)
       and freezes into a lit still under prefers-reduced-motion.
       SEAM FOR REAL FOOTAGE: to run licensed or original film here instead,
       drop a <video class="rw-film" muted autoplay loop playsinline
       poster="..."> as the first child of .rw-scene; the CSS already
       grades it (cover, grayscale, patient). The CSS composition beneath
       remains the low-bandwidth and reduced-motion fallback. -->
  <div id="runway" aria-hidden="true">
    <div class="rw-scene">
      <div class="rw-floor"></div>
      <div class="rw-monolith"></div>
      <div class="rw-light"></div>
      <div class="rw-veil"></div>
    </div>
  </div>

  <header id="topbar">
    <div>
      <div class="wordmark">MONOLITH</div>
      <div class="tagline">VERDICT · FIT · OWN · SPEND</div>
    </div>
    <button id="budget-strip" class="budget-strip" type="button" title="Open CAPITAL">–</button>
  </header>

  <main id="view"></main>

  <!-- Beta feedback line: hidden until the frontend confirms a multi-user
       server (boot() removes [hidden]). Five invited users, one mailto;
       replying must be easy, a feedback system would be overbuild. -->
  <footer id="beta-footer" hidden>
    BETA · SOMETHING OFF OR CONFUSING? <a href="mailto:mitwilli@gmail.com?subject=MONOLITH%20beta">EMAIL MITCHELL</a>
  </footer>

  <nav id="tabbar">
    <button data-tab="verdict" class="active">VERDICT<span class="tabsub">buy · compare</span></button>
    <button data-tab="size">SIZE<span class="tabsub">fit</span></button>
    <button data-tab="vault">VAULT<span class="tabsub">closet · upkeep</span></button>
    <button data-tab="capital">CAPITAL<span class="tabsub">spend</span></button>
  </nav>

  <script>
    // The film pauses once scrolled offstage: no offscreen animation work.
    (function () {
      var rw = document.getElementById("runway");
      if (!rw) return;
      var ticking = false;
      function check() {
        ticking = false;
        var r = rw.getBoundingClientRect();
        rw.classList.toggle("rw-paused", r.bottom <= 0);
      }
      window.addEventListener("scroll", function () {
        if (!ticking) { ticking = true; window.requestAnimationFrame(check); }
      }, { passive: true });
      check();
    })();
  </script>
  <script src="/app.js"></script>
</body>
</html>
